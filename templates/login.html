<h1>🔐 Login</h1>

<form action="/login" method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        Login
    </button>

</form>
