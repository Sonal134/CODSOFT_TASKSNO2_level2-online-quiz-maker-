{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>📝 Create Quiz</h1>

    <form action="/create_quiz" method="POST">

        <input
            type="text"
            name="title"
            placeholder="Enter Quiz Title"
            required>

        <textarea
            name="description"
            placeholder="Enter Quiz Description"
            rows="5"
            required></textarea>

        <br><br>

        <button type="submit">
            Create Quiz
        </button>

    </form>

    <br>

    <a href="/dashboard" class="btn">
        Back to Dashboard
    </a>

</div>

{% endblock %}
